services:
  app:
    build:
      context: .
    command: ["uv", "run", "granian", "--interface", "asgi", "app.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--reload"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/uchimsa
      SECRET_KEY: dev-secret-change-me
